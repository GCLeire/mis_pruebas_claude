name: Claude Code Review
on:
  # la primera vez que hicimos el commit pusimos el push para que lo reconociese, ahora
  # ya no hace falta 
  # push:
  # branches: [ master, probando_claude_dia1 ]
  pull_request:
    branches: [ master ]
  
permissions:
  contents: write        # <-- antes era read, esto impedía comentar
  id-token: write
  pull-requests: write

jobs:
  claude_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # <-- necesario para que Claude vea el diff

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          # El secret que guardaste en GitHub
          api-key: ${{ secrets.OPENROUTER_API_KEY }}
          # Configuración para OpenRouter
          api-base-url: "https://openrouter.ai/api/v1"   # <-- faltaba /api/v1
          model: "anthropic/claude-3.5-sonnet"
