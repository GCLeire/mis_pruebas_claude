name: Claude Code Review
on:
  # la primera vez que hicimos el commit pusimos el push para que lo reconociese, ahora
  # ya no hace falta 
  # push:
  # branches: [ master, probando_claude_dia1 ]
  pull_request:
    branches: [ master ]
  
permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  claude_review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Claude Code Action
        uses: anthropics/claude-code-action@v1
        with:
          # El secret que guardaste en GitHub
          api-key: ${{ secrets.OPENROUTER_API_KEY }}
          # Configuración para OpenRouter
          api-base-url: "https://openrouter.ai"
          model: "anthropic/claude-3.5-sonnet"
